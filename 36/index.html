<!DOCTYPE html>
<html lang="pt-br" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Subscribe Toast Notification | CodingLab</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
  </head>
  <body>

    <div class="toast">
      <div class="toast-content">
        <i class="fas fa-bell check"></i>
        <div class="message">
          <span class="text text-1">New Update!</span>
          <span class="text text-2">Subscribe to our channel for more videos</span>
        </div>
      </div>
      <a href="https://www.youtube.com/@CodingLabYT" target="_blank" class="button">Subscribe</a>
      <i class="fas fa-times close"></i>
    </div>

  </body>
</html>
